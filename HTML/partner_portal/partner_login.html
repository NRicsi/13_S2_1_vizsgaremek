<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ÚtdíjPro - Partner Portál Bejelentkezés</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700;900&family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" integrity="sha512-SnH5WK+bZxgPHs44uWIX+LLJAJ9/2PkPKZ5QiAj6Ta86w+fsb2TkcmfRyVX3pBnMFcV7oQPJkl9QevSCWr3W6A==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <style>
        :root {
            --color-primary: #0ea5e9; /* sky-500 */
            --color-secondary: #6366f1; /* indigo-500 */
            --color-background: #030712; /* gray-950 */
            --color-surface: #0f172a; /* slate-900 */
            --color-text-base: #e2e8f0; /* slate-200 */
            --color-text-muted: #94a3b8; /* slate-400 */
            --color-border: rgba(56, 189, 248, 0.2);
        }
        body {
            font-family: 'Roboto', sans-serif;
            background-color: var(--color-background);
            color: var(--color-text-base);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow-x: hidden;
            padding: 1rem;
        }
        .font-poppins {
            font-family: 'Poppins', sans-serif;
        }
        .login-container {
            background: rgba(15, 23, 42, 0.75); /* slate-900 áttetszőbb */
            backdrop-filter: blur(16px) saturate(180%);
            -webkit-backdrop-filter: blur(16px) saturate(180%);
            border: 1px solid var(--color-border);
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.5);
        }
        .form-input {
            background-color: rgba(30, 41, 59, 0.8); /* slate-800 áttetszőbb */
            border: 1px solid var(--color-border);
            color: white;
            transition: border-color 0.3s ease, box-shadow 0.3s ease;
        }
        .form-input:focus {
            border-color: var(--color-primary);
            box-shadow: 0 0 0 3px rgba(var(--color-primary), 0.3); /* Itt a primary color RGB értékét kellene használni */
            outline: none;
        }
        .form-input::placeholder {
            color: var(--color-text-muted);
        }
        .submit-button {
            background: linear-gradient(90deg, var(--color-primary), var(--color-secondary));
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0,0,0, 0.2);
        }
        .submit-button:hover {
            transform: translateY(-2px) scale(1.02);
            box-shadow: 0 6px 20px rgba(var(--color-primary), 0.4);
        }
        .submit-button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        .logo-container i {
            text-shadow: 0 0 15px var(--color-primary);
        }
        .logo-container span span {
             text-shadow: 0 0 10px var(--color-primary);
        }
    </style>
</head>
<body class="antialiased">
    <div class="login-container w-full max-w-md p-8 md:p-12 rounded-2xl">
        <div class="logo-container text-center mb-10">
            <a href="index.html" class="flex items-center justify-center space-x-3" title="Vissza a főoldalra">
                <i class="fas fa-road-bridge fa-3x text-[var(--color-primary)]"></i>
                <span class="font-poppins self-center text-4xl font-bold whitespace-nowrap text-white">Útdíj<span class="text-[var(--color-primary)]">Pro</span></span>
            </a>
            <p class="text-[var(--color-primary)] mt-2 text-lg font-medium">Partner Portál</p>
        </div>

        <form id="loginForm">
            <div class="mb-6">
                <label for="email" class="block mb-2 text-sm font-medium text-sky-200">Email cím</label>
                <input type="email" id="email" name="email" class="form-input text-sm rounded-lg block w-full p-3.5" placeholder="azonosito@cegnev.hu" required>
            </div>
            <div class="mb-8">
                <label for="password" class="block mb-2 text-sm font-medium text-sky-200">Jelszó</label>
                <input type="password" id="password" name="password" class="form-input text-sm rounded-lg block w-full p-3.5" placeholder="••••••••" required>
            </div>
            <div class="flex items-center justify-between mb-8">
                <div class="flex items-start">
                    <div class="flex items-center h-5">
                        <input id="remember" aria-describedby="remember" type="checkbox" class="w-4 h-4 border-gray-600 rounded bg-gray-700 focus:ring-3 focus:ring-[var(--color-primary)] checked:bg-[var(--color-primary)]">
                    </div>
                    <div class="ms-3 text-sm">
                        <label for="remember" class="text-gray-400">Emlékezz rám</label>
                    </div>
                </div>
                <a href="#" class="text-sm font-medium text-[var(--color-primary)] hover:underline">Elfelejtette jelszavát?</a>
            </div>
            <button type="submit" id="submitBtn" class="submit-button w-full text-white font-semibold rounded-lg text-lg px-5 py-3.5 text-center">
                <i class="fas fa-sign-in-alt mr-2"></i>Bejelentkezés
            </button>
        </form>
        <p class="text-sm text-gray-500 text-center mt-8">
            Nincs még hozzáférése? <a href="../bemutatkozo_oldal/index.html#contact" class="font-medium text-[var(--color-primary)] hover:underline">Vegye fel velünk a kapcsolatot</a> a regisztrációhoz.
        </p>
    </div>

    <script>
        const loginForm = document.getElementById('loginForm');
        const submitBtn = document.getElementById('submitBtn');

        if (loginForm) {
            loginForm.addEventListener('submit', function(e) {
                e.preventDefault(); 
                
                const email = document.getElementById('email').value;
                const password = document.getElementById('password').value;

                if (!email || !password) {
                    alert('Kérjük, töltse ki az email és jelszó mezőket!');
                    return;
                }

                console.log('Bejelentkezési kísérlet (szimuláció):', { email }); // Jelszót ne logoljunk!
                submitBtn.innerHTML = '<i class="fas fa-spinner fa-spin mr-2"></i>Bejelentkezés...';
                submitBtn.disabled = true;

                // Szimuláljuk a backend hívást
                setTimeout(() => {
                    // Itt kellene a valós backend authentikáció eredményét ellenőrizni.
                    // Sikeres bejelentkezés esetén átirányítás a partner dashboardra:
                    window.location.href = 'partner_dashboard.html'; // Ezt a fájlt hozzuk létre következőnek
                    
                    // Hiba esetén:
                    // alert('Hibás email cím vagy jelszó!');
                    // submitBtn.innerHTML = '<i class="fas fa-sign-in-alt mr-2"></i>Bejelentkezés';
                    // submitBtn.disabled = false;
                }, 1500);
            });
        }
    </script>
</body>
</html>
